<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Toko Komputer</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0a0a0a; color: #ededed; text-align: center; padding: 24px;
      }
      .card { max-width: 360px; }
      .icon {
        width: 64px; height: 64px; margin: 0 auto 16px; border-radius: 16px;
        background: #3b5bdb; display: flex; align-items: center; justify-content: center; font-size: 30px;
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { color: #a1a1a1; line-height: 1.5; margin: 0 0 20px; }
      button {
        background: #3b5bdb; color: #fff; border: 0; border-radius: 8px;
        padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">🛒</div>
      <h1>Anda sedang offline</h1>
      <p>Tidak ada koneksi internet. Halaman ini belum tersimpan untuk dibuka offline. Coba lagi saat koneksi kembali.</p>
      <button onclick="location.reload()">Coba Lagi</button>
    </div>
  </body>
</html>
